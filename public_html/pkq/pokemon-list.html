<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモン一覧 - ポケモンクエスト情報サイト</title>
  <meta name="description" content="ポケモンクエストの全151匹のポケモン一覧。タイプや名前で検索できます。">
  <link rel="stylesheet" href="https://asobi.info/assets/css/common.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">ポケクエ<span>.asobi.info</span></a>
      <button class="menu-toggle">&#9776;</button>
      <nav class="site-nav">
        <ul>
          <li><a href="/pokemon-list.html" class="active">ポケモン一覧</a></li>
          <li><a href="/recipes.html">料理一覧</a></li>
          <li><a href="/moves.html">わざ一覧</a></li>
          <li><a href="/simulator.html">料理シミュレーター</a></li>
          <li><a href="/iv-checker.html">個体値チェッカー</a></li>
          <li><a href="/iv-report.php">結果を投稿</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <div class="breadcrumb"><a href="/">ポケクエ</a><span>ポケモン一覧</span></div>
      <h1>ポケモン一覧</h1>
      <p>全151匹のポケモンデータ</p>
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="ポケモン名、タイプ、図鑑番号で検索...">
    </div>

    <div class="type-filter-btns" id="type-filters">
      <button class="type-filter-btn active" data-type="" style="background:#555;">すべて</button>
      <button class="type-filter-btn" data-type="ノーマル" style="background:#9e9e9e;">ノーマル</button>
      <button class="type-filter-btn" data-type="ほのお"   style="background:#e74c3c;">ほのお</button>
      <button class="type-filter-btn" data-type="みず"     style="background:#2980b9;">みず</button>
      <button class="type-filter-btn" data-type="くさ"     style="background:#27ae60;">くさ</button>
      <button class="type-filter-btn" data-type="でんき"   style="background:#f1c40f;">でんき</button>
      <button class="type-filter-btn" data-type="こおり"   style="background:#55d1e8;">こおり</button>
      <button class="type-filter-btn" data-type="かくとう" style="background:#7f5233;">かくとう</button>
      <button class="type-filter-btn" data-type="どく"     style="background:#9c27b0;">どく</button>
      <button class="type-filter-btn" data-type="じめん"   style="background:#cddc39;">じめん</button>
      <button class="type-filter-btn" data-type="ひこう"   style="background:#90caf9;">ひこう</button>
      <button class="type-filter-btn" data-type="エスパー" style="background:#e91e8c;">エスパー</button>
      <button class="type-filter-btn" data-type="むし"     style="background:#8bc34a;">むし</button>
      <button class="type-filter-btn" data-type="いわ"     style="background:#8d6e63;">いわ</button>
      <button class="type-filter-btn" data-type="ゴースト" style="background:#5c6bc0;">ゴースト</button>
      <button class="type-filter-btn" data-type="ドラゴン" style="background:#3949ab;">ドラゴン</button>
      <button class="type-filter-btn" data-type="フェアリー" style="background:#f48fb1;">フェアリー</button>
    </div>

    <div class="result-count" id="result-count"></div>

    <div id="pokemon-list" class="card-grid"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 あそび - ポケモンクエスト情報サイト</p>
    </div>
  </footer>

  <script src="https://asobi.info/assets/js/common.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      PQApp.loadPokemon('pokemon-list');

      // 検索
      document.getElementById('search-input').addEventListener('input', debounce((e) => {
        PQApp.searchPokemon(e.target.value, document.getElementById('pokemon-list'));
      }));

      // タイプフィルター（2つまで複数選択）
      let selectedTypes = [];
      const listEl = document.getElementById('pokemon-list');
      document.querySelectorAll('#type-filters .type-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const type = btn.dataset.type;
          const allBtn = document.querySelector('#type-filters .type-filter-btn[data-type=""]');
          if (type === '') {
            selectedTypes = [];
            document.querySelectorAll('#type-filters .type-filter-btn').forEach(b => b.classList.remove('active'));
            allBtn.classList.add('active');
          } else {
            allBtn.classList.remove('active');
            if (btn.classList.contains('active')) {
              btn.classList.remove('active');
              selectedTypes = selectedTypes.filter(t => t !== type);
              if (selectedTypes.length === 0) allBtn.classList.add('active');
            } else {
              if (selectedTypes.length >= 2) {
                const old = selectedTypes.shift();
                const oldBtn = document.querySelector(`#type-filters .type-filter-btn[data-type="${old}"]`);
                if (oldBtn) oldBtn.classList.remove('active');
              }
              btn.classList.add('active');
              selectedTypes.push(type);
            }
          }
          PQApp.filterByType(selectedTypes, listEl);
        });
      });
    });
  </script>
</body>
</html>
