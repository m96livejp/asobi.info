<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモン詳細 - ポケモンクエスト情報</title>
  <meta name="description" content="ポケモンのプロフィール・覚えるワザ・入手できる料理を確認。">
  <link rel="stylesheet" href="https://asobi.info/assets/css/common.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }

    /* ヒーロー */
    .poke-hero {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .poke-hero-img {
      width: 96px;
      height: 96px;
      background: var(--bg-primary);
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .poke-hero-info { flex: 1; min-width: 0; }
    .poke-hero-no {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }
    .poke-hero-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 8px;
    }
    .poke-hero-types { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .poke-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .poke-stat strong { color: var(--accent); }

    /* セクションカード */
    .section-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* 進化チェーン */
    .evo-chain {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .evo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-primary);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      min-width: 64px;
      transition: border-color 0.15s;
    }
    .evo-item:hover { border-color: var(--accent); }
    .evo-item.current { border-color: var(--accent); background: rgba(225,112,85,0.08); }
    .evo-item-name { font-size: 0.8rem; font-weight: 600; }
    .evo-item-no { font-size: 0.7rem; color: var(--text-secondary); }
    .evo-arrow {
      color: var(--text-secondary);
      font-size: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .evo-arrow span { font-size: 0.7rem; color: var(--text-secondary); }

    /* 入手料理 */
    .recipe-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .recipe-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-primary);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      width: 72px;
      transition: border-color 0.15s;
    }
    .recipe-item:hover { border-color: var(--accent); }
    .recipe-item img { width: 48px; height: 48px; object-fit: contain; border-radius: 6px; }
    .recipe-item-no { font-size: 0.68rem; color: var(--text-secondary); }
    .recipe-item-name { font-size: 0.7rem; text-align: center; line-height: 1.3; color: var(--text-primary); }
    .evo-note {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      padding: 6px 10px;
      background: var(--bg-primary);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }

    /* ワザ一覧 */
    .moves-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .moves-table th {
      text-align: left;
      padding: 6px 10px;
      color: var(--text-secondary);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .moves-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }
    .moves-table tr:last-child td { border-bottom: none; }
    .moves-table tr:hover td { background: var(--bg-primary); }
    .move-power {
      font-weight: 700;
      color: var(--text-primary);
    }
    .move-power-0 { color: var(--text-secondary); }
    .move-wait { color: var(--text-secondary); font-size: 0.82rem; }
    .move-desc { color: var(--text-secondary); font-size: 0.8rem; }

    /* タイプバッジ（小） */
    .type-badge-sm {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #fff;
    }

    .loading-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">ポケクエ<span>.asobi.info</span></a>
      <button class="menu-toggle">&#9776;</button>
            <nav class="site-nav">
        <ul>
          <li><a href="/pokemon-list.html" class="active">ポケモン一覧</a></li>
          <li><a href="/recipes.html">料理一覧</a></li>
          <li><a href="/moves.html">わざ一覧</a></li>
          <li><a href="/simulator.html">料理シミュレーター</a></li>
          <li><a href="/iv-checker.html">個体値チェッカー</a></li>
          <li><a href="/iv-report.php">結果を投稿</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <a href="/pokemon-list.html" class="back-link">← ポケモン一覧に戻る</a>
    <div id="detail-container">
      <div class="loading-msg">読み込み中...</div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 あそび - ポケモンクエスト情報サイト</p>
    </div>
  </footer>

  <script src="https://asobi.info/assets/js/common.js"></script>
  <script>
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // タイプバッジカラーマップ（style.css と同じ値）
  const TYPE_COLORS = {
    'ノーマル':'#a8a878','ほのお':'#f08030','みず':'#6890f0','でんき':'#f8d030',
    'くさ':'#78c850','こおり':'#98d8d8','かくとう':'#c03028','どく':'#a040a0',
    'じめん':'#e0c068','ひこう':'#a890f0','エスパー':'#f85888','むし':'#a8b820',
    'いわ':'#b8a038','ゴースト':'#705898','ドラゴン':'#7038f8','あく':'#705848',
    'はがね':'#b8b8d0','フェアリー':'#f0a0c0',
  };

  function typeBadgeSm(type) {
    const bg = TYPE_COLORS[type] || '#888';
    const textColor = ['でんき','くさ'].includes(type) ? '#333' : '#fff';
    return `<span class="type-badge-sm" style="background:${bg};color:${textColor};">${esc(type)}</span>`;
  }

  (async () => {
    const params = new URLSearchParams(location.search);
    const pokedexNo = parseInt(params.get('no'));
    const container = document.getElementById('detail-container');

    if (!pokedexNo) {
      container.innerHTML = '<p>ポケモンNo.が指定されていません。</p>';
      return;
    }

    try {
      const p = await API.get('/api/pokemon.php', { id: pokedexNo });

      document.title = `${p.name} - ポケモン詳細 - ポケモンクエスト`;

      // ---- 進化チェーン構築 ----
      // 進化前を再帰的にたどる（ルートまで）
      async function buildChain(pokemon) {
        if (pokemon.evolution_from) {
          const parent = await API.get('/api/pokemon.php', { id: pokemon.evolution_from });
          const chain  = await buildChain(parent);
          return [...chain, pokemon];
        }
        return [pokemon];
      }

      // 進化後を再帰的にたどって追加する
      async function addFutureEvolutions(pokemon, chain) {
        for (const evo of (pokemon.evolves_to || [])) {
          const evoFull = await API.get('/api/pokemon.php', { id: evo.pokedex_no });
          chain.push(evoFull);
          await addFutureEvolutions(evoFull, chain);
        }
      }

      // 現在のポケモンのルートまでさかのぼり、そこから全進化先まで構築
      const chainBase = await buildChain(p);
      const fullChain = [...chainBase];
      // 現在地以降の進化先を再帰的に追加
      await addFutureEvolutions(p, fullChain);

      // ---- 進化チェーン HTML ----
      function evoItemHtml(poke, isCurrent) {
        const no  = poke.pokedex_no || poke.pokedex_no;
        const nm  = poke.name;
        const lvl = poke.evolve_level ? `Lv.${poke.evolve_level}` : '';
        return `<a href="/pokemon-detail.html?no=${no}" class="evo-item ${isCurrent ? 'current' : ''}">
          <span style="font-size:1.8rem;">🔮</span>
          <span class="evo-item-name">${esc(nm)}</span>
          <span class="evo-item-no">No.${String(no).padStart(3,'0')}</span>
        </a>`;
      }

      let evoHtml = '';
      if (fullChain.length > 1) {
        const parts = [];
        for (let i = 0; i < fullChain.length; i++) {
          const poke      = fullChain[i];
          const isCurrent = (poke.pokedex_no || poke.pokedex_no) === pokedexNo;
          if (i > 0) {
            const lvl = poke.evolve_level ? `Lv.${poke.evolve_level}` : '';
            parts.push(`<div class="evo-arrow">→<span>${lvl}</span></div>`);
          }
          parts.push(evoItemHtml(poke, isCurrent));
        }
        evoHtml = `
          <div class="section-card">
            <p class="section-title">進化</p>
            <div class="evo-chain">${parts.join('')}</div>
          </div>`;
      }

      // ---- 入手料理 HTML ----
      let recipesHtml = '';
      if (p.recipes && p.recipes.length > 0) {
        const evoNote = p.recipe_from_evolution
          ? `<div class="evo-note">「${esc(p.evolution_from_name)}」から進化で入手。入手できる料理は進化前と同じです。</div>`
          : '';
        const items = p.recipes.map(r => {
          const img = r.image_path
            ? `<img src="/images/recipes/${esc(r.image_path)}" alt="${esc(r.name)}">`
            : `<span style="font-size:2rem;">🍲</span>`;
          return `<a href="/recipe-detail.html?no=${r.recipe_no}" class="recipe-item">
            ${img}
            <span class="recipe-item-no">No.${r.recipe_no}</span>
            <span class="recipe-item-name">${esc(r.name)}</span>
          </a>`;
        }).join('');
        recipesHtml = `
          <div class="section-card">
            <p class="section-title">入手できる料理</p>
            ${evoNote}
            <div class="recipe-list">${items}</div>
          </div>`;
      } else {
        recipesHtml = `
          <div class="section-card">
            <p class="section-title">入手できる料理</p>
            <p style="color:var(--text-secondary);font-size:0.9rem;">データなし</p>
          </div>`;
      }

      // ---- ワザ一覧 HTML ----
      let movesHtml = '';
      if (p.moves && p.moves.length > 0) {
        const rows = p.moves.map(m => {
          const powerCell = m.power > 0
            ? `<span class="move-power">${m.power}</span>`
            : `<span class="move-power-0">—</span>`;
          return `<tr>
            <td><strong>${esc(m.name)}</strong></td>
            <td>${typeBadgeSm(m.type)}</td>
            <td>${powerCell}</td>
            <td class="move-wait">${m.wait}秒</td>
            <td class="move-desc">${esc(m.description || '')}</td>
          </tr>`;
        }).join('');
        movesHtml = `
          <div class="section-card">
            <p class="section-title">覚えるワザ</p>
            <table class="moves-table">
              <thead>
                <tr>
                  <th>ワザ名</th>
                  <th>タイプ</th>
                  <th>威力</th>
                  <th>ウエイト</th>
                  <th>説明</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } else {
        movesHtml = `
          <div class="section-card">
            <p class="section-title">覚えるワザ</p>
            <p style="color:var(--text-secondary);font-size:0.9rem;">データなし</p>
          </div>`;
      }

      // ---- ヒーロー部分 ----
      const heroHtml = `
        <div class="poke-hero">
          <div class="poke-hero-img">🔮</div>
          <div class="poke-hero-info">
            <div class="poke-hero-no">No.${String(pokedexNo).padStart(3,'0')}</div>
            <h1 class="poke-hero-name">${esc(p.name)}</h1>
            <div class="poke-hero-types">
              ${typeBadgeSm(p.type1)}
              ${p.type2 ? typeBadgeSm(p.type2) : ''}
            </div>
            <div class="poke-stats">
              <div><strong>HP</strong>&nbsp;${p.base_hp || '?'}</div>
              <div><strong>ATK</strong>&nbsp;${p.base_atk || '?'}</div>
              ${p.evolution_from_name ? `<div style="color:var(--text-secondary);font-size:0.82rem;">「${esc(p.evolution_from_name)}」から進化</div>` : ''}
            </div>
          </div>
        </div>`;

      // ---- ツールリンク ----
      const toolsHtml = `
        <div class="section-card" style="margin-top:16px;">
          <p class="section-title">🔬 このポケモンの個体値を調べる</p>
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <a href="/iv-checker.html?no=${pokedexNo}"
               style="flex:1;min-width:140px;display:block;padding:12px 16px;background:var(--accent);color:#fff;border-radius:8px;text-align:center;text-decoration:none;font-weight:600;">
              📊 個体値チェッカー
            </a>
            <a href="/iv-report.php?pokemon_id=${pokedexNo}"
               style="flex:1;min-width:140px;display:block;padding:12px 16px;background:transparent;border:2px solid var(--accent);border-radius:8px;text-align:center;text-decoration:none;font-weight:600;color:var(--accent);">
              📝 結果を投稿
            </a>
          </div>
        </div>`;

      container.innerHTML = heroHtml + evoHtml + recipesHtml + movesHtml + toolsHtml;

    } catch (e) {
      container.innerHTML = `<p style="color:red;">エラー: ${esc(e.message)}</p>`;
    }
  })();
  </script>
</body>
</html>
