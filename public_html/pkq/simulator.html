<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>料理シミュレーター - ポケモンクエスト情報サイト</title>
  <meta name="description" content="ポケモンクエストの料理シミュレーター。素材を5つ選んでどの料理ができるか確認できます。">
  <link rel="stylesheet" href="https://asobi.info/assets/css/common.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">ポケクエ<span>.asobi.info</span></a>
      <button class="menu-toggle">&#9776;</button>
      <nav class="site-nav">
        <ul>
          <li><a href="/pokemon-list.html">ポケモン一覧</a></li>
          <li><a href="/recipes.html">料理一覧</a></li>
          <li><a href="/moves.html">わざ一覧</a></li>
          <li><a href="/simulator.html" class="active">料理シミュレーター</a></li>
          <li><a href="/iv-checker.html">個体値チェッカー</a></li>
          <li><a href="/iv-report.php">結果を投稿</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <div class="breadcrumb"><a href="/">ポケクエ</a><span>料理シミュレーター</span></div>
      <h1>料理シミュレーター</h1>
      <p>素材を5つ選んでどの料理ができるか確認しよう</p>
    </div>

    <div class="simulator">

      <!-- 鍋の種類セレクター -->
      <div class="pot-selector">
        <button class="pot-type-btn active" data-pot="鉄" onclick="PQApp.selectPot('鉄', this)">鉄の鍋</button>
        <button class="pot-type-btn" data-pot="銅" onclick="PQApp.selectPot('銅', this)">銅の鍋</button>
        <button class="pot-type-btn" data-pot="銀" onclick="PQApp.selectPot('銀', this)">銀の鍋</button>
        <button class="pot-type-btn" data-pot="金" onclick="PQApp.selectPot('金', this)">金の鍋</button>
      </div>

      <div class="sim-layout">

        <!-- 鍋エリア -->
        <div class="pot-area">
          <div class="pot-wrapper pot-iron">
          <div class="pot-lid-knob"></div>
          <div class="pot-lid">
            <div class="pot-lid-info">
              <span class="pot-lid-info-label">必要素材個数</span>
              <span class="pot-lid-info-num" id="pot-lid-num">3</span>
            </div>
          </div>
          <div class="pot-container">
            <div class="pot-handle pot-handle-left"></div>
            <div class="pot-handle pot-handle-right"></div>
            <div class="pot-inner">
              <div class="pot-row">
                <div class="pot-slot" id="pot-slot-0"></div>
                <div class="pot-slot" id="pot-slot-1"></div>
              </div>
              <div class="pot-row">
                <div class="pot-slot" id="pot-slot-2"></div>
                <div class="pot-slot" id="pot-slot-3"></div>
                <div class="pot-slot" id="pot-slot-4"></div>
              </div>
            </div>
          </div>
          </div><!-- /.pot-wrapper -->
          <div class="reset-area">
            <button class="reset-btn" onclick="PQApp.resetSimulator()" title="すべてリセット">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- 素材ピッカー -->
        <div class="picker-area">
          <div class="ingredient-picker" id="ingredient-picker">
            <div class="loading">素材データを読み込み中</div>
          </div>
        </div>

      </div>

      <div class="result-box" id="result-box" style="display:none;"></div>


    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 あそび - ポケモンクエスト情報サイト</p>
    </div>
  </footer>

  <script src="https://asobi.info/assets/js/common.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      PQApp.initSimulator();
    });
  </script>
</body>
</html>
