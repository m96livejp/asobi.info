<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サバイバー一覧 - DbD情報サイト</title>
  <meta name="description" content="Dead by Daylightの全サバイバー一覧。各キャラクターの固有パークを確認できます。">
  <link rel="stylesheet" href="https://asobi.info/assets/css/common.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">DbD<span>.asobi.info</span></a>
      <button class="menu-toggle">&#9776;</button>
      <nav class="site-nav">
        <div class="nav-group">
          <span class="nav-group-label">サバイバー</span>
          <a href="/survivor-characters.html" class="active">全キャラクター</a>
          <a href="/survivor-perks.html">パーク</a>
          <a href="/survivor-offerings.html">オファリング</a>
          <a href="/survivor-items.html">アイテム</a>
          <a href="/survivor-addons.html">アドオン</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">キラー</span>
          <a href="/killer-abilities.html">全キャラクター</a>
          <a href="/killer-perks.html">パーク</a>
          <a href="/killer-offerings.html">オファリング</a>
          <a href="/killer-speed.html">足の速さ</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <div class="breadcrumb"><a href="/">DbD</a><span>サバイバー一覧</span></div>
      <h1>サバイバー一覧</h1>
      <p>全サバイバーとその固有パークを一覧表示</p>
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="サバイバー名、パーク名で検索...">
    </div>

    <div class="result-count" id="result-count"></div>

    <div id="survivor-list"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 あそび - Dead by Daylight 情報サイト</p>
    </div>
  </footer>

  <script src="https://asobi.info/assets/js/common.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('survivor-list');
      const survivors = await DbDApp.loadSurvivors('survivor-list');

      document.getElementById('search-input').addEventListener('input', debounce((e) => {
        const q = e.target.value.toLowerCase();
        const filtered = survivors.filter(s =>
          s.name.toLowerCase().includes(q) ||
          s.name_en.toLowerCase().includes(q) ||
          s.perks.some(p => p.name.toLowerCase().includes(q) || (p.name_en && p.name_en.toLowerCase().includes(q)))
        );
        DbDApp.renderSurvivors(filtered, container);
        DbDApp.updateCount(filtered.length);
      }));
    });
  </script>
</body>
</html>
