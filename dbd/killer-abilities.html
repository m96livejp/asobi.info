<head>

  <link rel="stylesheet" href="https://asobi.info/assets/css/common.css?v=20260327e">
  <link rel="stylesheet" href="/css/style.css?v=20260327b">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">DbD<span>.asobi.info</span></a>
      <button class="menu-toggle">&#9776;</button>
            <nav class="site-nav">
        <div class="nav-group">
          <span class="nav-group-label">サバイバー</span>
          <a href="/survivor-characters.html">全キャラクター</a>
          <a href="/survivor-perks.html">パーク</a>
          <a href="/survivor-offerings.html">オファリング</a>
          <a href="/survivor-items.html">アイテム</a>
          <a href="/survivor-addons.html">アドオン</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-label">キラー</span>
          <a href="/killer-abilities.html" class="active">全キャラクター</a>
          <a href="/killer-perks.html">パーク</a>
          <a href="/killer-offerings.html">オファリング</a>
          <a href="/killer-speed.html">足の速さ</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <div class="breadcrumb"><a href="/">DbD</a><span>キラー能力一覧</span></div>
      <h1>キラー能力一覧</h1>
      <p>全キラーの特殊能力（パワー）を一覧表示</p>
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="キラー名、能力名で検索...">
    </div>

    <div id="killer-list"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 あそび - Dead by Daylight 情報サイト</p>
    </div>
  </footer>

  <script src="https://asobi.info/assets/js/common.js?v=20260327e"></script>
  <script src="/js/app.js?v=20260327b"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('killer-list');
      const killers = await DbDApp.loadKillers('killer-list');
      DbDApp.renderKillerAbilities(killers, container);

      document.getElementById('search-input').addEventListener('input', debounce((e) => {
        const q = e.target.value.toLowerCase();
        const filtered = killers.filter(k =>
          k.name.toLowerCase().includes(q) ||
          k.name_en.toLowerCase().includes(q) ||
          (k.power_name && k.power_name.toLowerCase().includes(q)) ||
          (k.power_description && k.power_description.toLowerCase().includes(q))
        );
        DbDApp.renderKillerAbilities(filtered, container);
      }));
    });
  </script>
</body>
</html>
