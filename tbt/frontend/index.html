<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e8f5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tournament Battle</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css?v=9">
    <meta name="google-adsense-account" content="ca-pub-2977641245900897">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2977641245900897" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <header id="header">
            <div class="header-left">
                <span class="game-title">Tournament Battle</span>
            </div>
            <div class="header-right">
                <span class="currency" id="points-display">🪙 0 PT</span>
                <span class="currency premium" id="premium-display">💎 0 GEM</span>
                <button class="header-settings-btn" id="settings-btn" title="設定">⚙</button>
                <div id="asobi-user-area" style="display:flex;align-items:center;gap:6px;font-size:0.8rem;opacity:0.85;"></div>
            </div>
        </header>
        <main id="main-content">
            <!-- 各画面がここに動的に描画される -->
        </main>
        <!-- バナー広告 -->
        <div id="ad-banner">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:320px;height:50px"
                 data-ad-client="ca-pub-2977641245900897"
                 data-ad-slot="XXXXXXXXXX"></ins>
            <span class="ad-placeholder">AD</span>
        </div>
        <nav id="bottom-nav">
            <button class="nav-btn" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">トップ</span>
            </button>
            <button class="nav-btn" data-page="character">
                <span class="nav-icon">⚔️</span>
                <span class="nav-label">キャラ</span>
            </button>
            <button class="nav-btn" data-page="gacha">
                <span class="nav-icon">🎰</span>
                <span class="nav-label">ガチャ</span>
            </button>
            <button class="nav-btn" data-page="items">
                <span class="nav-icon">📦</span>
                <span class="nav-label">アイテム</span>
            </button>
            <button class="nav-btn" data-page="tournament">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">大会</span>
            </button>
            <button class="nav-btn" data-page="ranking">
                <span class="nav-icon">📊</span>
                <span class="nav-label">ランキング</span>
            </button>
            <button class="nav-btn" data-page="shop">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">ショップ</span>
            </button>
        </nav>
    </div>

    <!-- バトル演出用オーバーレイ -->
    <div id="battle-overlay" class="overlay hidden">
        <div class="battle-arena">
            <div class="battle-char left" id="battle-char-left"></div>
            <div class="battle-vs">VS</div>
            <div class="battle-char right" id="battle-char-right"></div>
        </div>
        <div class="battle-log" id="battle-log"></div>
        <div class="battle-result hidden" id="battle-result"></div>
        <button class="btn btn-primary hidden" id="battle-close">閉じる</button>
    </div>

    <!-- ガチャ演出用オーバーレイ -->
    <div id="gacha-overlay" class="overlay hidden">
        <div class="gacha-animation" id="gacha-animation"></div>
        <div class="gacha-results hidden" id="gacha-results"></div>
        <button class="btn btn-primary hidden" id="gacha-close">閉じる</button>
    </div>

    <script src="js/utils/storage.js?v=9"></script>
    <script src="js/utils/ui.js?v=9"></script>
    <script src="js/api.js?v=9"></script>
    <script src="js/auth.js?v=9"></script>
    <script src="js/utils/animation.js?v=9"></script>
    <script src="js/components/home.js?v=9"></script>
    <script src="js/components/character.js?v=9"></script>
    <script src="js/components/gacha.js?v=9"></script>
    <script src="js/components/items.js?v=9"></script>
    <script src="js/components/battle.js?v=9"></script>
    <script src="js/components/tournament.js?v=9"></script>
    <script src="js/components/shop.js?v=9"></script>
    <script src="js/components/settings.js?v=9"></script>
    <script src="js/components/terms.js?v=9"></script>
    <script src="js/components/login.js?v=9"></script>
    <script src="js/components/ranking.js?v=9"></script>
    <script src="js/components/ad-banner.js?v=9"></script>
    <script src="js/app.js?v=9"></script>
    <script>
    // asobi.info ログイン表示（ドロップダウン）
    (function() {
      const area = document.getElementById('asobi-user-area');
      if (!area) return;
      fetch('https://asobi.info/assets/php/me.php', { credentials: 'include' })
        .then(r => r.json())
        .then(u => {
          if (u.loggedIn) {
            const av = u.avatarUrl
              ? `<img src="${u.avatarUrl}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;" alt="">`
              : `<span style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;flex-shrink:0;">${u.initial}</span>`;
            const adminItems = u.role === 'admin'
              ? `<div style="height:1px;background:#e0e0e0;margin:4px 0;"></div>
                 <a href="https://tbt.asobi.info/admin/" style="display:block;padding:9px 16px;font-size:0.82rem;color:#1d1d1f;text-decoration:none;white-space:nowrap;">サイト管理画面</a>
                 <a href="https://asobi.info/admin/" style="display:block;padding:9px 16px;font-size:0.82rem;color:#1d1d1f;text-decoration:none;white-space:nowrap;">asobi.info 管理画面</a>`
              : '';
            area.style.position = 'relative';
            area.innerHTML = `
              <div id="asobi-trigger" style="display:flex;align-items:center;cursor:pointer;padding:3px 4px;border-radius:8px;" title="${u.displayName}">
                ${av}
              </div>
              <div id="asobi-dropdown" style="display:none;position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid #e0e0e0;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.14);overflow:hidden;z-index:300;">
                <a href="https://asobi.info/" style="display:block;padding:9px 16px;font-size:0.82rem;color:#1d1d1f;text-decoration:none;white-space:nowrap;">asobi.info トップ</a>
                <div style="height:1px;background:#e0e0e0;margin:4px 0;"></div>
                <a href="https://asobi.info/profile.php" style="display:block;padding:9px 16px;font-size:0.82rem;color:#1d1d1f;text-decoration:none;white-space:nowrap;">プロフィール</a>
                ${adminItems}
              </div>`;
            const trigger = document.getElementById('asobi-trigger');
            const dropdown = document.getElementById('asobi-dropdown');
            trigger.addEventListener('click', e => {
              e.stopPropagation();
              dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            });
            document.addEventListener('click', () => { dropdown.style.display = 'none'; });
          } else {
            area.innerHTML = `<a href="https://asobi.info/login.php?redirect=${encodeURIComponent(location.href)}" style="font-size:0.82rem;font-weight:600;padding:6px 16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:20px;text-decoration:none;white-space:nowrap;">ログイン</a>`;
          }
        }).catch(() => {});
    })();
    </script>
</body>
</html>
