<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#e8f5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tournament Battle</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css?v=9">
    <meta name="google-adsense-account" content="ca-pub-2977641245900897">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2977641245900897" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <header id="header">
            <div class="header-left">
                <span class="game-title">Tournament Battle</span>
            </div>
            <div class="header-right">
                <div id="asobi-user-area" style="display:flex;align-items:center;gap:6px;font-size:0.8rem;opacity:0.85;"></div>
            </div>
        </header>
        <main id="main-content">
            <!-- 各画面がここに動的に描画される -->
        </main>
        <!-- バナー広告 -->
        <div id="ad-banner">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:320px;height:50px"
                 data-ad-client="ca-pub-2977641245900897"
                 data-ad-slot="XXXXXXXXXX"></ins>
            <span class="ad-placeholder">AD</span>
        </div>
        <nav id="bottom-nav">
            <button class="nav-btn" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">トップ</span>
            </button>
            <button class="nav-btn" data-page="character">
                <span class="nav-icon">⚔️</span>
                <span class="nav-label">キャラ</span>
            </button>
            <button class="nav-btn" data-page="gacha">
                <span class="nav-icon">🎰</span>
                <span class="nav-label">ガチャ</span>
            </button>
            <button class="nav-btn" data-page="items">
                <span class="nav-icon">📦</span>
                <span class="nav-label">アイテム</span>
            </button>
            <button class="nav-btn" data-page="tournament">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">大会</span>
            </button>
            <button class="nav-btn" data-page="ranking">
                <span class="nav-icon">📊</span>
                <span class="nav-label">ランキング</span>
            </button>
            <button class="nav-btn" data-page="shop">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">ショップ</span>
            </button>
        </nav>
    </div>

    <!-- バトル演出用オーバーレイ -->
    <div id="battle-overlay" class="overlay hidden">
        <div class="battle-arena">
            <div class="battle-char left" id="battle-char-left"></div>
            <div class="battle-vs">VS</div>
            <div class="battle-char right" id="battle-char-right"></div>
        </div>
        <div class="battle-log" id="battle-log"></div>
        <div class="battle-result hidden" id="battle-result"></div>
        <button class="btn btn-primary hidden" id="battle-close">閉じる</button>
    </div>

    <!-- ガチャ演出用オーバーレイ -->
    <div id="gacha-overlay" class="overlay hidden">
        <div class="gacha-animation" id="gacha-animation"></div>
        <div class="gacha-results hidden" id="gacha-results"></div>
        <button class="btn btn-primary hidden" id="gacha-close">閉じる</button>
    </div>

    <script src="js/utils/storage.js?v=9"></script>
    <script src="js/utils/ui.js?v=9"></script>
    <script src="js/api.js?v=9"></script>
    <script src="js/auth.js?v=9"></script>
    <script src="js/utils/animation.js?v=9"></script>
    <script src="js/components/home.js?v=9"></script>
    <script src="js/components/character.js?v=9"></script>
    <script src="js/components/gacha.js?v=9"></script>
    <script src="js/components/items.js?v=9"></script>
    <script src="js/components/battle.js?v=9"></script>
    <script src="js/components/tournament.js?v=9"></script>
    <script src="js/components/shop.js?v=9"></script>
    <script src="js/components/settings.js?v=9"></script>
    <script src="js/components/terms.js?v=9"></script>
    <script src="js/components/login.js?v=9"></script>
    <script src="js/components/ranking.js?v=9"></script>
    <script src="js/components/ad-banner.js?v=9"></script>
    <script src="js/app.js?v=9"></script>
    <script src="https://asobi.info/assets/js/common.js"></script>
</body>
</html>
