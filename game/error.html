<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません - ゲーム情報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:#f8f8fc;color:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{text-align:center;max-width:400px;width:100%}
.code{font-size:4rem;font-weight:700;background:linear-gradient(135deg,#5c4ed4,#8b72ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.msg{font-size:1rem;color:#555577;margin-bottom:32px;line-height:1.6}
.links{display:flex;flex-direction:column;gap:10px;align-items:center}
.links a{display:inline-block;padding:10px 24px;border-radius:20px;font-size:0.9rem;font-weight:600;text-decoration:none;transition:opacity 0.2s}
.btn-top{background:linear-gradient(135deg,#5c4ed4,#8b72ff);color:#fff}
.btn-top:hover{opacity:0.85}
.btn-sub{background:#e0e0ef;color:#1a1a2e}
.btn-sub:hover{background:#d0d0df}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <p class="msg">お探しのページが見つかりませんでした。</p>
  <div class="links">
    <a href="/" class="btn-top">ゲーム情報トップへ</a>
    <a href="https://asobi.info" class="btn-sub">asobi.info トップへ</a>
  </div>
</div>
</body>
</html>
